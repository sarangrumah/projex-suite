global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "projex-api"
    static_configs:
      - targets: ["projex-api:8000"]
    metrics_path: /metrics

  - job_name: "era-ai-api"
    static_configs:
      - targets: ["era-ai-api:8100"]
    metrics_path: /metrics

  - job_name: "erabudget-api"
    static_configs:
      - targets: ["erabudget-api:8200"]
    metrics_path: /metrics

  - job_name: "appcatalog-api"
    static_configs:
      - targets: ["appcatalog-api:8300"]
    metrics_path: /metrics

  - job_name: "wahub-gateway"
    static_configs:
      - targets: ["wahub-gateway:8500"]
    metrics_path: /metrics

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
